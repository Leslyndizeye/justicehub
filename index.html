
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JusticeHub | The Future of Rwandan Legal Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              legal: {
                navy: '#0A0C14',
                gold: '#C5A059',
                charcoal: '#1A1D23',
                slate: '#1E293B',
                blue: '#3B82F6',
              }
            },
            fontFamily: {
              serif: ['Playfair Display', 'serif'],
              sans: ['Plus Jakarta Sans', 'sans-serif'],
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'scroll': 'scroll 40s linear infinite',
              'burst-snap': 'burstSnap 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards',
              'glitch-fade': 'glitchFade 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards',
              'fade-in-up': 'fadeInUp 1s ease-out forwards',
              'scanline': 'scanline 8s linear infinite',
              'spin-slow': 'spin 12s linear infinite',
            },
            keyframes: {
              scroll: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' },
              },
              burstSnap: {
                '0%': { opacity: '0', transform: 'scale(1.3) translateY(20px)', filter: 'blur(50px)' },
                '60%': { opacity: '1', transform: 'scale(0.95)', filter: 'blur(0)' },
                '100%': { opacity: '1', transform: 'scale(1)', filter: 'blur(0)' }
              },
              glitchFade: {
                '0%': { opacity: '0', transform: 'translateY(10px)', filter: 'blur(10px)' },
                '20%': { opacity: '0.8', transform: 'translateY(-2px) skewX(5deg)' },
                '40%': { opacity: '0.5', transform: 'translateY(2px) skewX(-5deg)' },
                '100%': { opacity: '1', transform: 'translateY(0)', filter: 'blur(0)' }
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' }
              },
              scanline: {
                '0%': { top: '-10%' },
                '100%': { top: '110%' }
              }
            }
          }
        }
      }
    </script>
    <style>
      html {
        font-size: 88%;
      }
      body {
        background-color: #f3f4f6;
        color: #0a0c14;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }
      html.dark body {
        background-color: #05070A;
        color: #f8fafc;
      }
      
      .grid-lines {
        background-image: linear-gradient(to right, rgba(197, 160, 89, 0.05) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(197, 160, 89, 0.05) 1px, transparent 1px);
        background-size: 60px 60px;
      }

      /* Rain Animation Styles */
      .rain-drop {
        position: absolute;
        top: -100px;
        width: 1px;
        height: 80px;
        background: linear-gradient(to bottom, transparent, rgba(197, 160, 89, 0.8));
        animation: rain linear infinite;
      }

      @keyframes rain {
        0% { transform: translateY(0vh); }
        100% { transform: translateY(110vh); }
      }

      .reveal {
        opacity: 0;
        transform: translateY(40px);
        transition: opacity 1.2s cubic-bezier(0.19, 1, 0.22, 1), transform 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        will-change: transform, opacity;
      }
      .reveal.active {
        opacity: 1;
        transform: translateY(0);
      }

      .mask-marquee {
        mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
      }

      .animate-delay-200 { animation-delay: 200ms; }
      .animate-delay-500 { animation-delay: 500ms; }
      .animate-delay-1000 { animation-delay: 1000ms; }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #05070A; }
      ::-webkit-scrollbar-thumb { background: #1A1D23; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #C5A059; }

      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(197, 160, 89, 0.1); }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(197, 160, 89, 0.3); }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "firebase/": "https://esm.sh/firebase@^12.7.0/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
</head>
  <body class="font-sans selection:bg-legal-gold/30">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
